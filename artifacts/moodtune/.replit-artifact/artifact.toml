kind = "web"
previewPath = "/"
title = "MoodTune"
version = "1.0.0"
id = "artifacts/moodtune"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20206

[services.development]
run = "pnpm --filter @workspace/moodtune run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moodtune", "run", "build" ]
publicDir = "artifacts/moodtune/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20206"
BASE_PATH = "/"
